<!DOCTYPE html>
<html>
<head>
    <title>DPlayer - Fixed Stable Build</title>
    <meta http-equiv="content-type" content="text/html;charset=UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0"/>
    <meta name="referrer" content="never"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer@latest/dist/DPlayer.min.css">
    <style type="text/css">
        body,html{width:100%;height:100%;background:#000;padding:0;margin:0;overflow:hidden}
        #dplayer{width:100%;height:100%}
        #next-notice {
            position: fixed;
            bottom: 40px; 
            right: 20px;
            background: rgba(33, 33, 33, 0.95); 
            color: #eee;
            padding: 12px 18px;
            border-radius: 6px;
            z-index: 999;
            display: none;
            font-family: sans-serif;
            font-size: 13px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            min-width: 200px;
            border: 1px solid #444;
        }
        .notice-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #close-notice { cursor: pointer; color: #888; font-size: 20px; line-height: 20px; }
        .progress-container { width: 100%; height: 3px; background: #444; border-radius: 2px; overflow: hidden; }
        #progress-bar { width: 100%; height: 100%; background: #bbb; }
    </style>
</head>
<body>

<div id="dplayer"></div>

<div id="next-notice">
    <div class="notice-header">
        <span>Next episode in <b id="seconds">7</b>s...</span>
        <span id="close-notice" onclick="cancelCountdown()">&times;</span>
    </div>
    <div class="progress-container"><div id="progress-bar"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/dplayer@latest"></script>

<script>
    var webdata = {
        set: function(key, val){ window.localStorage.setItem(key, val); },
        get: function(key){ return window.localStorage.getItem(key); }
    };

    var dp = new DPlayer({
        container: document.getElementById('dplayer'),
        autoplay: true,
        volume: 0,
        video: {
            url: parent.MacPlayer.PlayUrl,
            type: 'hls'
        },
    });

    // Handle Autoplay
    var playPromise = dp.play();
    if (playPromise !== undefined && typeof playPromise.catch === 'function') {
        playPromise.catch(function() {
            document.addEventListener('click', function() {
                dp.play();
                dp.volume(0.7, true); 
            }, { once: true });
        });
    }

    // Memory Play
    dp.on('canplay', function () {
        var lastTime = webdata.get('time_' + parent.MacPlayer.PlayUrl);
        if (lastTime > 0) {
            dp.seek(lastTime);
        }
    });

    // Auto-Skip Logic
    var countdownActive = false;
    var timerInterval = null;

    dp.on('timeupdate', function () {
        var cur = dp.video.currentTime;
        var dur = dp.video.duration;

        if (cur > 0) {
            webdata.set('time_' + parent.MacPlayer.PlayUrl, cur);
        }

        if (dur > 0 && parent.MacPlayer.PlayLinkNext != '' && !countdownActive) {
            if ((dur - cur) <= 60) {
                startCountdown();
            }
        }
    });

    function startCountdown() {
        countdownActive = true;
        document.getElementById('next-notice').style.display = 'block';
        
        var totalMs = 7000; 
        var elapsedMs = 0;

        timerInterval = setInterval(function() {
            elapsedMs += 100;
            var remaining = Math.ceil((totalMs - elapsedMs) / 1000);
            document.getElementById('seconds').innerText = remaining > 0 ? remaining : 0;
            document.getElementById('progress-bar').style.width = ((totalMs - elapsedMs) / totalMs * 100) + "%";

            if (elapsedMs >= totalMs) {
                clearInterval(timerInterval);
                webdata.set('time_' + parent.MacPlayer.PlayUrl, 0);
                top.location.href = parent.MacPlayer.PlayLinkNext;
            }
        }, 100); // Fixed the missing ) that caused your error
    }

    function cancelCountdown() {
        clearInterval(timerInterval);
        document.getElementById('next-notice').style.display = 'none';
        countdownActive = true; // Prevents it from popping up again for this video
    }
</script>
</body>
</html>
